name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release, e.g. 0.2.0 (a v-prefixed tag and release are created)'
        required: true

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Build and publish macOS app
    runs-on: macos-26
    timeout-minutes: 40

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Determine version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="${GITHUB_REF_NAME}"
          fi
          VERSION="${VERSION#v}"
          if [ -z "$VERSION" ]; then
            echo "::error::Could not determine a release version"; exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"
          echo "Releasing NeoClash $VERSION"

      - name: Show toolchain
        run: |
          swift --version
          xcodebuild -version

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Stamp version numbers
        env:
          VERSION: ${{ steps.version.outputs.version }}
          BUILD: ${{ github.run_number }}
        run: |
          /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString $VERSION" NeoClash/App/Info.plist
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion $BUILD" NeoClash/App/Info.plist

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build Release app
        run: |
          xcodebuild build \
            -project NeoClash.xcodeproj \
            -scheme NeoClash \
            -configuration Release \
            -derivedDataPath build \
            -destination 'platform=macOS' \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=YES

      - name: Package DMG and zip
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail
          APP="build/Build/Products/Release/NeoClash.app"
          test -d "$APP" || { echo "::error::App not found at $APP"; exit 1; }

          # Ad-hoc re-sign the whole bundle so the embedded framework matches the app.
          codesign --force --deep --sign - "$APP"

          mkdir -p dist

          # Zip preserves bundle metadata and symlinks.
          ditto -c -k --keepParent "$APP" "dist/NeoClash-$VERSION-macOS.zip"

          # DMG with an /Applications drop target.
          STAGE="$(mktemp -d)"
          cp -R "$APP" "$STAGE/"
          ln -s /Applications "$STAGE/Applications"
          hdiutil create -volname "NeoClash $VERSION" \
            -srcfolder "$STAGE" -ov -format UDZO \
            "dist/NeoClash-$VERSION.dmg"

          ls -lh dist

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: NeoClash ${{ steps.version.outputs.version }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            dist/NeoClash-${{ steps.version.outputs.version }}.dmg
            dist/NeoClash-${{ steps.version.outputs.version }}-macOS.zip
          body: |
            Automated build of the NeoClash macOS app.

            **Install:** open the DMG and drag NeoClash to Applications (or unzip the `.zip`).

            > This build is ad-hoc signed and **not notarized**. On first launch, right-click the app and choose **Open**, or run:
            > `xattr -dr com.apple.quarantine /Applications/NeoClash.app`
